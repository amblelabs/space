name: Automated Builds

on:
  workflow_dispatch:
  push:
      paths:
        - common/**
        - fabric/**
        - forge/**
        - build.gradle
        - gradle.properties
        - settings.gradle
        - gradle/**
        - gradlew
        - gradlew.bat
        - versioning.gradle
        - .github/workflows/*

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

#    - name: Restore DataGen cache
#      id: cache-restore
#      uses: actions/cache/restore@v4
#      with:
#        path: src/main/generated
#        key: datagen-${{ github.run_id }}
#        restore-keys:
#          datagen-

#    - name: Run DataGen
#      run: ./gradlew --configuration-cache runDatagen

#    - name: Save DataGen cache
#      id: cache-save
#      uses: actions/cache/save@v4
#      with:
#        path: src/main/generated
#        key: ${{ steps.cache-restore.outputs.cache-primary-key }}
    
    - name: Build
      run: ./gradlew --configuration-cache :build

    - name: Setup Amble Maven
      id: setup-maven
      uses: drtheodor/static-file-server-actions/upload/setup@main
      with:
        repo: amblelabs/maven

    - name: Build for Maven
      env:
        CI_MAVEN_PATH: ${{ steps.setup-maven.outputs.path }}
      run: ./gradlew --configuration-cache :publishMavenJavaPublicationToCiRepository

    - name: Publish to Amble Maven
      uses: drtheodor/static-file-server-actions/upload@main
      with:
        published: dev/amble/space
        token: ${{ secrets.BOT_TOKEN }}
        message: "chore: publish space artifacts"

    - name: Publish artifacts
      uses: drtheodor/discord-webhook-upload-action@v0.2
      with:
        url: ${{ secrets.DEV_BUILDS }}
        username: bill kerman
        avatar: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT1vssI1IWukz2hbQ-0EBkbiybEMoEm-Qt9_w&s'
        
        message_commit: '> - :sparkles: [${commitMessage}](<${commitUrl}>) by [${authorName}](<${authorUrl}>)'
        message_header: |
          <:new1:1253371736510959636><:new2:1253371805734015006> New **Space** dev build `#${{ github.run_number }}`:

        file: |
          fabric/build/libs/*.jar
          !fabric/build/libs/*-sources.jar
          forge/build/libs/*.jar
          !forge/build/libs/*-sources.jar
